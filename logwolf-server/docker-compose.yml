version: '3'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ./frontend.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      API_URL: http://broker:80/
      SESSION_SECRET: changeme-use-a-real-secret-in-production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LOGWOLF_ALLOWED_GITHUB_USERS: ${LOGWOLF_ALLOWED_GITHUB_USERS:-}
      LOGWOLF_ALLOWED_GITHUB_ORGS: ${LOGWOLF_ALLOWED_GITHUB_ORGS:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_KEY: ${API_KEY}
    networks:
      - public
      - internal

  broker:
    build:
      context: .
      dockerfile: ./broker/broker.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    networks:
      - public
      - internal

  logger:
    build:
      context: .
      dockerfile: ./logger/logger.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    networks:
      - internal

  listener:
    build:
      context: .
      dockerfile: ./listener/listener.dockerfile
    deploy:
      mode: replicated
      replicas: 1
    networks:
      - internal

  mongo:
    image: 'mongo:4.2.16-bionic'
    deploy:
      mode: replicated
      replicas: 1
    environment:
      MONGO_INITDB_DATABASE: logs
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./db-data/mongo/:/data/db
    networks:
      - internal

  rabbitmq:
    image: 'rabbitmq:3.9-alpine'
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - ./db-data/rabbitmq/:/var/lib/rabbitmq/
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - frontend
      - broker
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./db-data/caddy/data:/data
      - ./db-data/caddy/config:/config
    networks:
      - public

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
